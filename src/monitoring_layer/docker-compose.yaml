services:
  statsd-exporter:
    image: prom/statsd-exporter:v0.28.0
    command:
      - "--statsd.mapping-config=/etc/statsd/statsd_mapping.yml"
    volumes:
      - ./src/monitoring_layer/statsd_mapping.yml:/etc/statsd/statsd_mapping.yml:ro
    ports:
      - "9102:9102"   # /metrics endpoint Prometheus scrapes
    restart: always

  prometheus:
    image: prom/prometheus:v3.12.0
    entrypoint: /bin/sh
    command: ["/etc/prometheus/entrypoint.sh"]
    volumes:
      - ./src/monitoring_layer/prometheus_entrypoint.sh:/etc/prometheus/entrypoint.sh:ro
      - ./src/monitoring_layer/prometheus.yml:/etc/prometheus/prometheus.template.yml:ro
      - prometheus-data:/prometheus
    environment:
      - SUPABASE_PROJECT_REF=${SUPABASE_PROJECT_REF}
      - SUPABASE_METRICS_SECRET_KEY=${SUPABASE_METRICS_SECRET_KEY}
    ports:
      - "9090:9090"
    depends_on:
      - statsd-exporter
    restart: always

volumes:
  prometheus-data:
