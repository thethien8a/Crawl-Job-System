services:
  caddy:
    image: caddy:alpine
    volumes:
      - ./src/monitoring_layer/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
    environment:
      - MONITORING_DOMAIN=${MONITORING_DOMAIN:-localhost}
      - MONITORING_AUTH_USER=${MONITORING_AUTH_USER:-admin}
      - MONITORING_AUTH_PASSWORD_HASH=${MONITORING_AUTH_PASSWORD_HASH}
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - dashboards
      - grafana
    restart: always

  prometheus:
    image: prom/prometheus:v3.12.0
    entrypoint: /bin/sh
    command: ["/etc/prometheus/entrypoint.sh"]
    volumes:
      - ./src/monitoring_layer/prometheus/entrypoint.sh:/etc/prometheus/entrypoint.sh:ro
      - ./src/monitoring_layer/prometheus/prometheus.yml:/etc/prometheus/prometheus.template.yml:ro
      - prometheus-data:/prometheus
    environment:
      - SUPABASE_PROJECT_REF=${SUPABASE_PROJECT_REF}
      - SUPABASE_METRICS_SECRET_KEY=${SUPABASE_METRICS_SECRET_KEY}
    expose:
      - "9090"
    restart: always

  grafana:
    image: grafana/grafana:latest
    environment:
      - GF_SERVER_ROOT_URL=${MONITORING_SCHEME:-http}://${MONITORING_DOMAIN:-localhost}/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - ./src/monitoring_layer/grafana/datasources.yml:/etc/grafana/provisioning/datasources/prometheus.yml:ro
      - grafana-data:/var/lib/grafana
    expose:
      - "3000"
    depends_on:
      - prometheus
    restart: always

  dashboards:
    image: nginx:alpine
    entrypoint: /bin/sh
    command: ["/etc/nginx/entrypoint.sh"]
    volumes:
      - ./src/monitoring_layer/business:/usr/share/nginx/html:ro
      - ./src/monitoring_layer/nginx/dashboards.conf:/etc/nginx/conf.d/default.conf:ro
      - ./src/monitoring_layer/nginx/index.html:/usr/share/nginx/landing/index.html:ro
      - ./src/monitoring_layer/nginx/entrypoint.sh:/etc/nginx/entrypoint.sh:ro
    expose:
      - "80"
    restart: always

volumes:
  prometheus-data:
  grafana-data:
  caddy-data:
