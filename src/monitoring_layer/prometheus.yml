global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus scraping itself
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # Airflow metrics
  - job_name: airflow
    static_configs:
      - targets: ["statsd-exporter:9102"]

  # Supabase metrics:
  - job_name: supabase