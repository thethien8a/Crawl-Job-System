global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus scraping itself
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # Airflow metrics
  - job_name: airflow
    static_configs:
      - targets: ["statsd-exporter:9102"]

  # Supabase Metrics API
  - job_name: supabase
    scrape_interval: 60s
    metrics_path: /customer/v1/privileged/metrics
    scheme: https
    basic_auth:
      username: service_role
      password: ${SUPABASE_METRICS_SECRET_KEY}
    static_configs:
      - targets: ["${SUPABASE_PROJECT_REF}.supabase.co:443"]
        labels:
          project: "${SUPABASE_PROJECT_REF}"
