# Serves the static Bronze/Silver dashboards behind the Caddy authentication gate.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;

    # Authentication is enforced by Caddy before requests reach this container.

    # Only the generated dashboards are meant to be served;
    # block the Python sources that live in the same mounted directory.
    location ~* \.(py|pyc)$ {
        deny all;
    }

    # Landing page is mounted in its own directory (not inside the read-only
    # business/ mount, which cannot host an overlaid file mountpoint).
    location = / {
        root /usr/share/nginx/landing;
        try_files /index.html =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
