# statsd-exporter mapping for Airflow metrics.
mappings:
  # Scheduler liveness and queue pressure.
  - match: "airflow.scheduler_heartbeat"
    name: "airflow_scheduler_heartbeat_total"
  - match: "airflow\\.(.*)_heartbeat_failure"
    match_type: regex
    name: "airflow_job_heartbeat_failures_total"
    labels:
      job_name: "$1"
  - match: "airflow.scheduler.tasks.starving"
    name: "airflow_scheduler_tasks_starving"
  - match: "airflow.scheduler.tasks.executable"
    name: "airflow_scheduler_tasks_executable"

  # Executor capacity gauges by executor implementation.
  - match: "airflow.executor.open_slots"
    name: "airflow_executor_open_slots"
    labels:
      executor: "default"
  - match: "airflow.executor.queued_tasks"
    name: "airflow_executor_queued_tasks"
    labels:
      executor: "default"
  - match: "airflow.executor.running_tasks"
    name: "airflow_executor_running_tasks"
    labels:
      executor: "default"
  - match: "airflow.executor.open_slots.*"
    name: "airflow_executor_open_slots"
    labels:
      executor: "$1"
  - match: "airflow.executor.queued_tasks.*"
    name: "airflow_executor_queued_tasks"
    labels:
      executor: "$1"
  - match: "airflow.executor.running_tasks.*"
    name: "airflow_executor_running_tasks"
    labels:
      executor: "$1"

  # Task-instance lifecycle counters with DAG and task labels.
  - match: "airflow.ti.start.*.*"
    name: "airflow_task_instance_started_total"
    labels:
      dag_id: "$1"
      task_id: "$2"
  - match: "airflow.ti.finish.*.*.*"
    name: "airflow_task_instance_finished_total"
    labels:
      dag_id: "$1"
      task_id: "$2"
      state: "$3"
  - match: "airflow.ti_successes"
    name: "airflow_task_instance_successes_total"
  - match: "airflow.ti_failures"
    name: "airflow_task_instance_failures_total"

  # Per-task run time: airflow.dag.<dag_id>.<task_id>.duration
  - match: "airflow.dag.*.*.duration"
    name: "airflow_task_duration"
    labels:
      dag_id: "$1"
      task_id: "$2"

  # DAG run wall-clock time, split by final state
  - match: "airflow.dagrun.duration.success.*"
    name: "airflow_dagrun_duration_success"
    labels:
      dag_id: "$1"
  - match: "airflow.dagrun.duration.failed.*"
    name: "airflow_dagrun_duration_failed"
    labels:
      dag_id: "$1"

  # Delay between scheduled time and actual start (scheduler lag per DAG)
  - match: "airflow.dagrun.schedule_delay.*"
    name: "airflow_dagrun_schedule_delay"
    labels:
      dag_id: "$1"

  # Operator-level success/failure counts (e.g. DockerOperator)
  # NOTE: glob matching does not support "_*" suffixes; use regex for these.
  - match: "airflow\\.operator_successes_(.*)"
    match_type: regex
    name: "airflow_operator_successes_total"
    labels:
      operator: "$1"
  - match: "airflow\\.operator_failures_(.*)"
    match_type: regex
    name: "airflow_operator_failures_total"
    labels:
      operator: "$1"

  # Pool capacity gauges (default pool unless custom pools are added)
  - match: "airflow.pool.open_slots.*"
    name: "airflow_pool_open_slots"
    labels:
      pool: "$1"
  - match: "airflow.pool.queued_slots.*"
    name: "airflow_pool_queued_slots"
    labels:
      pool: "$1"
  - match: "airflow.pool.running_slots.*"
    name: "airflow_pool_running_slots"
    labels:
      pool: "$1"
  - match: "airflow.pool.starving_tasks.*"
    name: "airflow_pool_starving_tasks"
    labels:
      pool: "$1"
